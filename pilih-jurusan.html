<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Jurusan - SMK TI Bali Global</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span>🔷 SMK TI Bali Global</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Beranda</a></li>
                <li><a href="pilih-jurusan.html" class="nav-link active">Pilih Jurusan</a></li>
                <li><a href="pilih-ekskul.html" class="nav-link">Pilih Ekskul</a></li>
                <li><a href="dashboard-siswa.html" class="nav-link">Dashboard</a></li>
            </ul>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <section class="dashboard" style="padding-top: 120px;">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1>📝 Form Pemilihan Jurusan</h1>
                <p style="color: var(--text-gray);">Isi data diri dan pilih jurusan yang kamu minati</p>
            </div>

            <div class="glass-card" style="max-width: 800px; margin: 0 auto;">
                <form id="jurusanForm">
                    <div class="form-group">
                        <label class="form-label">Nama Lengkap *</label>
                        <input type="text" id="nama" class="form-control" placeholder="Masukkan nama lengkap" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">NISN *</label>
                        <input type="text" id="nisn" class="form-control" placeholder="Masukkan 10 digit NISN" maxlength="10" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Asal Sekolah *</label>
                        <input type="text" id="asalSekolah" class="form-control" placeholder="Masukkan asal sekolah" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Nomor WhatsApp *</label>
                        <input type="text" id="whatsapp" class="form-control" placeholder="Contoh: 08123456789" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" id="email" class="form-control" placeholder="contoh@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Pilihan Jurusan 1 *</label>
                        <select id="jurusan1" class="form-control" required>
                            <option value="">-- Pilih Jurusan --</option>
                            <option value="Rekayasa Perangkat Lunak (RPL)">💻 Rekayasa Perangkat Lunak (RPL)</option>
                            <option value="Teknik Komputer dan Jaringan (TKJ)">🌐 Teknik Komputer dan Jaringan (TKJ)</option>
                            <option value="Multimedia">🎨 Multimedia</option>
                            <option value="Akuntansi dan Keuangan Lembaga (AKL)">📊 Akuntansi dan Keuangan Lembaga (AKL)</option>
                            <option value="Perhotelan">🏨 Perhotelan</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Pilihan Jurusan 2 *</label>
                        <select id="jurusan2" class="form-control" required>
                            <option value="">-- Pilih Jurusan --</option>
                            <option value="Rekayasa Perangkat Lunak (RPL)">💻 Rekayasa Perangkat Lunak (RPL)</option>
                            <option value="Teknik Komputer dan Jaringan (TKJ)">🌐 Teknik Komputer dan Jaringan (TKJ)</option>
                            <option value="Multimedia">🎨 Multimedia</option>
                            <option value="Akuntansi dan Keuangan Lembaga (AKL)">📊 Akuntansi dan Keuangan Lembaga (AKL)</option>
                            <option value="Perhotelan">🏨 Perhotelan</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Alasan Memilih Jurusan *</label>
                        <textarea id="alasan" class="form-control" placeholder="Jelaskan alasan kamu memilih jurusan tersebut (minimal 10 karakter)" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        🚀 Daftar & Lanjut Pilih Ekskul
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
